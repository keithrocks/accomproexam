<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examination Results · Accompro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:       #0d1b2a;
  --navy-mid:   #162535;
  --navy-light: #1e3348;
  --gold:       #c9a84c;
  --gold-light: #e2c97e;
  --gold-pale:  #f5ecd4;
  --cream:      #faf7f0;
  --text:       #1a1a2e;
  --text-muted: #5a5a72;
  --border:     #d4c5a0;
  --white:      #ffffff;
  --pass:       #2e7d4f;
  --pass-bg:    #edf7f1;
  --fail:       #8b1a1a;
  --fail-bg:    #fdf0f0;
  --shadow-lg:  0 16px 56px rgba(13,27,42,.18);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Crimson Pro', Georgia, serif;
  background: var(--cream);
  background-image:
    radial-gradient(ellipse at 15% 0%,   rgba(201,168,76,.10) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 100%, rgba(13,27,42,.06)   0%, transparent 50%);
  min-height: 100vh;
  padding: 32px 20px 64px;
  color: var(--text);
}

.container {
  max-width: 1100px;
  margin: auto;
  background: var(--white);
  border-radius: 2px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  border: 1px solid var(--border);
}

/* ── HEADER ── */
.page-header {
  background: var(--navy);
  position: relative;
  overflow: hidden;
}

.page-header::before {
  content: '';
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(201,168,76,.04) 60px, rgba(201,168,76,.04) 61px),
    repeating-linear-gradient(0deg,  transparent, transparent 60px, rgba(201,168,76,.04) 60px, rgba(201,168,76,.04) 61px);
  pointer-events: none;
}

.header-stripe {
  height: 4px;
  background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
}

.header-inner {
  padding: 32px 48px 28px;
  position: relative; z-index: 1;
  display: flex; align-items: center; gap: 28px;
}

.seal {
  width: 64px; height: 64px; flex-shrink: 0;
  border: 2px solid var(--gold); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 20px; color: var(--gold);
  background: rgba(201,168,76,.08);
}

.header-text { flex: 1; }

.header-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); opacity: .8; margin-bottom: 7px;
}

.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 700;
  color: var(--white); line-height: 1.2;
}

.header-sub {
  margin-top: 5px; font-size: 15px;
  color: rgba(255,255,255,.45); font-style: italic;
}

.header-actions { display: flex; gap: 10px; align-items: center; }

.btn-action {
  padding: 9px 22px;
  border-radius: 2px; background: transparent;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; display: inline-flex; align-items: center; gap: 7px;
  transition: background .2s, border-color .2s; text-decoration: none;
}

.btn-print {
  border: 1.5px solid rgba(201,168,76,.5);
  color: var(--gold-light);
}
.btn-print:hover { background: rgba(201,168,76,.1); border-color: var(--gold); }

.btn-refresh {
  border: 1.5px solid rgba(100,180,255,.4);
  color: #90c8f0;
}
.btn-refresh:hover { background: rgba(100,180,255,.08); border-color: #90c8f0; }

.btn-clear {
  border: 1.5px solid rgba(220,80,80,.4);
  color: #e07070;
}
.btn-clear:hover { background: rgba(220,80,80,.08); border-color: #e07070; }

/* ── STATS BAR ── */
.stats-bar {
  background: var(--navy-mid);
  border-top: 1px solid rgba(201,168,76,.15);
  padding: 18px 48px;
  display: grid; grid-template-columns: repeat(4, 1fr);
}

.stat-item {
  text-align: center; padding: 0 20px;
  border-right: 1px solid rgba(255,255,255,.07);
}
.stat-item:last-child { border-right: none; }

.stat-value {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 700;
  color: var(--gold-light); line-height: 1; margin-bottom: 5px;
}

.stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(255,255,255,.35);
}

/* ── PAGE BODY ── */
.page-body { padding: 36px 48px; }

.controls {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 20px; gap: 16px; flex-wrap: wrap;
}

.section-heading {
  font-family: 'Playfair Display', serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--text-muted);
}

.search-input {
  padding: 8px 14px;
  border: 1px solid var(--border); border-radius: 2px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text); background: var(--cream);
  width: 220px; outline: none;
  transition: border-color .2s, box-shadow .2s;
}

.search-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,168,76,.1);
  background: var(--white);
}

.search-input::placeholder { color: #aaa; }

/* ── TABLE ── */
.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border); border-radius: 2px;
}

table { width: 100%; border-collapse: collapse; font-size: 15px; }

thead { background: var(--navy); position: sticky; top: 0; z-index: 2; }

thead th {
  padding: 13px 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; font-weight: 500;
  letter-spacing: 1.8px; text-transform: uppercase;
  color: rgba(201,168,76,.75); text-align: left;
  border-right: 1px solid rgba(255,255,255,.05);
  white-space: nowrap; cursor: pointer; user-select: none;
}
thead th:last-child { border-right: none; }
thead th:hover { color: var(--gold-light); }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .15s;
  animation: fadeRow .35s ease both;
}
@keyframes fadeRow {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(201,168,76,.04); }

tbody td {
  padding: 13px 18px; color: var(--text);
  vertical-align: middle;
  border-right: 1px solid rgba(212,197,160,.35);
}
tbody td:last-child { border-right: none; }

.col-rank { text-align: center; width: 52px; }

.rank-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 50%;
  font-size: 11px; font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
}
.rank-1 { background: #c9a84c22; color: var(--gold);  border: 1.5px solid var(--gold); }
.rank-2 { background: #c0c0c022; color: #a0a0b0;      border: 1.5px solid #a0a0b0; }
.rank-3 { background: #cd7f3222; color: #b87340;      border: 1.5px solid #b87340; }
.rank-n { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); }

.col-name strong {
  display: block; font-family: 'Crimson Pro', serif;
  font-size: 16px; font-weight: 600; color: var(--navy); line-height: 1.2;
}
.col-name span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; color: var(--text-muted); letter-spacing: .5px;
}

.score-fraction {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 700; color: var(--navy);
}

.score-bar-wrap {
  margin-top: 5px; height: 4px;
  background: var(--border); border-radius: 2px; overflow: hidden; width: 100px;
}
.score-bar { height: 100%; border-radius: 2px; }

.grade-badge {
  display: inline-flex; align-items: center;
  padding: 3px 12px; border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; font-weight: 500;
  letter-spacing: 1px; text-transform: uppercase; white-space: nowrap;
}
.grade-pass { background: var(--pass-bg); color: var(--pass); border: 1px solid #a8d5b8; }
.grade-fail { background: var(--fail-bg); color: var(--fail); border: 1px solid #e0b0b0; }

.col-datetime {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text-muted); white-space: nowrap; line-height: 1.6;
}

.col-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 500; color: var(--navy);
}

/* ── LOADING / EMPTY / ERROR ── */
.state-box {
  padding: 64px 32px; text-align: center;
}
.state-icon { font-size: 40px; margin-bottom: 16px; opacity: .35; }
.state-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px; color: var(--text-muted); margin-bottom: 8px;
}
.state-sub { font-size: 15px; color: #aaa; font-style: italic; }

.spinner {
  width: 36px; height: 36px; margin: 0 auto 16px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.no-results td {
  text-align: center; padding: 40px;
  font-style: italic; color: var(--text-muted); font-size: 15px;
}

/* ── FOOTER ── */
.page-footer {
  background: var(--navy); padding: 14px 48px;
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid rgba(201,168,76,.12);
}
.footer-left, .footer-right {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
}
.footer-left  { color: rgba(255,255,255,.22); }
.footer-right { color: rgba(201,168,76,.45); }

/* ── PRINT ── */
@media print {
  body { background: white; padding: 0; }
  .container { box-shadow: none; border: none; }
  .page-header::before { display: none; }
  .btn-action, .controls .search-input { display: none !important; }
  thead { background: #1a2a3a !important; -webkit-print-color-adjust: exact; }
  .stats-bar { background: #1e3348 !important; -webkit-print-color-adjust: exact; }
  .page-footer { background: #1a2a3a !important; -webkit-print-color-adjust: exact; }
}

@media (max-width: 768px) {
  body { padding: 10px; }
  .header-inner { padding: 22px 18px; flex-wrap: wrap; }
  .header-actions { width: 100%; justify-content: flex-start; }
  .stats-bar { grid-template-columns: 1fr 1fr; padding: 16px 18px; gap: 12px; }
  .stat-item { border-right: none; }
  .page-body { padding: 22px 16px; }
  .page-footer { padding: 12px 16px; flex-direction: column; gap: 4px; text-align: center; }
  .controls { flex-direction: column; align-items: flex-start; }
  .search-input { width: 100%; }
}
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <header class="page-header">
    <div class="header-stripe"></div>
    <div class="header-inner">
      <div class="seal">ACP</div>
      <div class="header-text">
        <div class="header-label">Accompro · Academic Year 2025–2026</div>
        <h1 class="header-title">Examination Results</h1>
        <p class="header-sub">Prof. Keith Rivera &nbsp;·&nbsp; Computer Applications &nbsp;·&nbsp; Final Term</p>
      </div>
      <div class="header-actions">
        <button class="btn-action btn-refresh" onclick="loadResults()">↺ Refresh</button>
        <button class="btn-action btn-print"   onclick="window.print()">⎙ Print</button>
        <button class="btn-action btn-clear"   onclick="clearResults()">✕ Clear All</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">Examinees</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statAvg">—</div>
        <div class="stat-label">Average Score</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statHigh">—</div>
        <div class="stat-label">Highest Score</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statPass">—</div>
        <div class="stat-label">Passing Rate</div>
      </div>
    </div>
  </header>

  <!-- BODY -->
  <main class="page-body">
    <div class="controls">
      <div class="section-heading" id="recordLabel">Submission Records</div>
      <input class="search-input" id="searchInput" type="text"
             placeholder="Search by name or section…" oninput="filterTable()">
    </div>

    <div id="tableArea">
      <div class="state-box">
        <div class="spinner"></div>
        <div class="state-title">Loading results…</div>
        <div class="state-sub">Fetching from Google Sheets</div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="page-footer">
    <div class="footer-left">Accompro · Final Term Assessment</div>
    <div class="footer-right" id="footerDate">—</div>
  </footer>

</div>

<script>
// ── PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE ──
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwtZERDzd22c-y2aeZL5NNeUn8ruLDkF8tTBEhDfmeskyc7THJUpa2-J7UGfSWHw7O95w/exec";

let allResults = [];
let sortDir    = {};

// ── LOAD ──
async function loadResults() {
  document.getElementById("tableArea").innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-title">Loading results…</div>
      <div class="state-sub">Fetching from Google Sheets</div>
    </div>`;

  updateStats([]);

  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=results`);
    const data = await res.json();

    if (!Array.isArray(data)) throw new Error("Unexpected response");

    allResults = data;
    renderTable(allResults);
    updateStats(allResults);

    const now = new Date();
    document.getElementById("footerDate").textContent =
      "Generated " + now.toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });

  } catch (err) {
    document.getElementById("tableArea").innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        <div class="state-title">Could not load results</div>
        <div class="state-sub">Make sure APPS_SCRIPT_URL is set correctly.<br><small style="font-family:monospace;font-size:12px;">${err.message}</small></div>
      </div>`;
  }
}

// ── RENDER ──
function renderTable(results) {
  if (results.length === 0) {
    document.getElementById("tableArea").innerHTML = `
      <div class="state-box">
        <div class="state-icon">📋</div>
        <div class="state-title">No submissions yet</div>
        <div class="state-sub">Results will appear here once examinees submit their exam.</div>
      </div>`;
    return;
  }

  // Rank by score
  const sorted  = [...results].sort((a,b) => b.score - a.score);
  const rankMap  = new Map();
  sorted.forEach((r, i) => rankMap.set(r.name + "|" + r.submitted_at, i + 1));

  const rows = results.map(r => {
    const pct   = Math.round((r.score / r.total) * 100 * 10) / 10;
    const pass  = pct >= 60;
    const rank  = rankMap.get(r.name + "|" + r.submitted_at) ?? "—";

    let barColor = "#e05252";
    if (pct >= 85)     barColor = "#4caf7a";
    else if (pct >= 70) barColor = "#7ec87e";
    else if (pct >= 60) barColor = "#c9a84c";

    let rankClass = "rank-n";
    if      (rank === 1) rankClass = "rank-1";
    else if (rank === 2) rankClass = "rank-2";
    else if (rank === 3) rankClass = "rank-3";

    const dt    = new Date(r.submitted_at.replace(" ", "T"));
    const date  = isNaN(dt) ? r.submitted_at : dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    const time  = isNaN(dt) ? "" : dt.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});

    return `
      <tr>
        <td class="col-rank"><span class="rank-badge ${rankClass}">${rank}</span></td>
        <td class="col-name">
          <strong>${esc(r.name)}</strong>
          <span>${esc(r.course)}</span>
        </td>
        <td>
          <div class="score-fraction">${r.score}<span style="font-size:13px;font-weight:400;color:var(--text-muted);">/${r.total}</span></div>
          <div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%;background:${barColor};"></div></div>
        </td>
        <td class="col-pct">${pct}%</td>
        <td>
          <span class="grade-badge ${pass ? 'grade-pass' : 'grade-fail'}">${pass ? '✓ Passed' : '✗ Failed'}</span>
        </td>
        <td class="col-datetime">${date}<br>${time}</td>
      </tr>`;
  }).join("");

  document.getElementById("tableArea").innerHTML = `
    <div class="table-wrap">
      <table id="resultsTable">
        <thead>
          <tr>
            <th onclick="sortTable(0)">#</th>
            <th onclick="sortTable(1)">Name &amp; Section</th>
            <th onclick="sortTable(2)">Score</th>
            <th onclick="sortTable(3)">Percentage</th>
            <th>Remark</th>
            <th onclick="sortTable(5)">Date &amp; Time Submitted</th>
          </tr>
        </thead>
        <tbody id="tableBody">${rows}</tbody>
      </table>
    </div>`;

  // stagger fade-in
  document.querySelectorAll('#tableBody tr').forEach((row, i) => {
    row.style.animationDelay = `${i * 35}ms`;
  });

  document.getElementById("recordLabel").textContent =
    `Submission Records — ${results.length} ${results.length === 1 ? 'entry' : 'entries'}`;
}

// ── STATS ──
function updateStats(results) {
  const total  = results.length;
  const avg    = total > 0 ? (results.reduce((s, r) => s + r.score, 0) / total).toFixed(1) : "—";
  const high   = total > 0 ? Math.max(...results.map(r => r.score)) : "—";
  const pass   = results.filter(r => (r.score / r.total) >= 0.60).length;
  const pRate  = total > 0 ? Math.round((pass / total) * 100) + "%" : "—";

  document.getElementById("statTotal").textContent = total || "0";
  document.getElementById("statAvg").innerHTML     = total > 0
    ? `${avg}<span style="font-size:14px;opacity:.6">/60</span>` : "—";
  document.getElementById("statHigh").innerHTML    = total > 0
    ? `${high}<span style="font-size:14px;opacity:.6">/60</span>` : "—";
  document.getElementById("statPass").textContent  = pRate;
}

// ── SEARCH FILTER ──
function filterTable() {
  const q    = document.getElementById("searchInput").value.toLowerCase();
  const rows = document.querySelectorAll('#tableBody tr:not(#noMatchRow)');
  let visible = 0;

  rows.forEach(row => {
    const match = row.textContent.toLowerCase().includes(q);
    row.style.display = match ? "" : "none";
    if (match) visible++;
  });

  let noRow = document.getElementById("noMatchRow");
  if (visible === 0 && rows.length > 0) {
    if (!noRow) {
      noRow = document.createElement("tr");
      noRow.id = "noMatchRow";
      noRow.className = "no-results";
      noRow.innerHTML = '<td colspan="6">No matching records found.</td>';
      document.getElementById("tableBody").appendChild(noRow);
    }
    noRow.style.display = "";
  } else if (noRow) {
    noRow.style.display = "none";
  }
}

// ── SORT ──
function sortTable(colIdx) {
  const tbody = document.getElementById("tableBody");
  if (!tbody) return;
  const rows = Array.from(tbody.querySelectorAll("tr:not(#noMatchRow)"));
  const asc  = !sortDir[colIdx];
  sortDir    = { [colIdx]: asc };

  rows.sort((a, b) => {
    const ta = a.cells[colIdx]?.textContent.trim() ?? "";
    const tb = b.cells[colIdx]?.textContent.trim() ?? "";
    const na = parseFloat(ta), nb = parseFloat(tb);
    if (!isNaN(na) && !isNaN(nb)) return asc ? na - nb : nb - na;
    return asc ? ta.localeCompare(tb) : tb.localeCompare(ta);
  });

  rows.forEach(r => tbody.appendChild(r));
}

// ── CLEAR ──//
async function clearResults() {
  if (!confirm("Are you sure you want to clear ALL results? This cannot be undone.")) return;

  try {
    await fetch(`${APPS_SCRIPT_URL}?action=clear`);
    allResults = [];
    renderTable([]);
    updateStats([]);
  } catch (err) {
    alert("Failed to clear results: " + err.message);
  }
}

// ── HELPERS ──
function esc(str) {
  return String(str ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── INIT ──
loadResults();
</script>
</body>
</html>
